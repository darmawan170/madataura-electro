<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WANSTORE.</title>
  <link rel="stylesheet" href="./style.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <header><div class="container nav"><div class="logo">WANSTORE.</div><input id="searchInput" placeholder="Cari produk..."><div class="cart-icon" id="cartBtn">🛒 <span id="cartCount">0</span></div></div></header>
  <section class="hero container"><div><span class="badge">NEW COLLECTION 2026</span><h1>Gaya Simple.<br>Kualitas Premium.</h1><p>Kurasi produk terbaik lokal & import. Gratis ongkir Surabaya.</p><button onclick="document.getElementById('produk').scrollIntoView({behavior:'smooth'})">Belanja Sekarang</button></div><div class="hero-img"></div></section>
  <main class="container" id="produk"><div class="filter-bar"><h2>Produk Pilihan</h2><div class="filters"><button class="filter active" data-cat="all">Semua</button><button class="filter" data-cat="fashion">Fashion</button><button class="filter" data-cat="sepatu">Sepatu</button><button class="filter" data-cat="elektronik">Elektronik</button></div></div><div id="productGrid" class="grid"></div></main>
  <div id="cartSidebar" class="cart-sidebar"><div class="cart-header"><h3>Keranjang (<span id="cartCount2">0</span>)</h3><button id="closeCart">✕</button></div><div id="cartItems"></div><div class="cart-footer"><div class="total"><span>Total</span><strong id="cartTotal">Rp0</strong></div><button class="checkout">Checkout WA</button></div></div>
  <div id="overlay" class="overlay"></div>
  <footer>© 2026 WANSTORE. Made in Surabaya.</footer>
  <script src="./script.js?v=2"></script>
</body>
</html>
