<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Madataura Electro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">

<!-- Halaman Login/Daftar -->
<div id="authPage" class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-md">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-blue-700">Madataura Electro</h1>
            <p class="text-gray-500">Belanja Mudah & Terpercaya</p>
        </div>
        <div class="flex mb-4 border-b">
            <button class="tab-btn active px-4 py-2 w-1/2 font-medium" onclick="switchTab('login')">Masuk</button>
            <button class="tab-btn px-4 py-2 w-1/2 font-medium" onclick="switchTab('daftar')">Daftar</button>
        </div>

        <!-- Form Masuk -->
        <div id="formLogin">
            <div class="mb-4">
                <label class="font-medium text-gray-700">Email</label>
                <input type="email" id="loginEmail" class="w-full p-3 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="email@anda.com">
            </div>
            <div class="mb-4">
                <label class="font-medium text-gray-700">Kata Sandi</label>
                <input type="password" id="loginPass" class="w-full p-3 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Masukkan kata sandi">
            </div>
            <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">Masuk</button>
        </div>

        <!-- Form Daftar -->
        <div id="formDaftar" class="hidden">
            <div class="mb-4">
                <label class="font-medium text-gray-700">Nama Lengkap</label>
                <input type="text" id="regNama" class="w-full p-3 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Nama lengkap Anda">
            </div>
            <div class="mb-4">
                <label class="font-medium text-gray-700">Email</label>
                <input type="email" id="regEmail" class="w-full p-3 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="email@anda.com">
            </div>
            <div class="mb-4">
                <label class="font-medium text-gray-700">Kata Sandi</label>
                <input type="password" id="regPass" class="w-full p-3 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Minimal 6 karakter">
            </div>
            <button onclick="daftar()" class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition">Buat Akun</button>
        </div>
    </div>
</div>

<!-- Halaman Utama (Setelah Login) -->
<div id="mainApp" class="hidden">
    <!-- Navbar -->
    <nav class="bg-blue-700 text-white fixed w-full top-0 z-50 shadow-lg">
        <div class="flex justify-around py-3">
            <a href="#" class="nav-link active flex flex-col items-center text-sm" data-target="beranda">
                <i class="fa fa-home text-lg"></i> Beranda
            </a>
            <a href="#" class="nav-link flex flex-col items-center text-sm" data-target="video">
                <i class="fa fa-video-camera text-lg"></i> Video
            </a>
            <a href="#" class="nav-link flex flex-col items-center text-sm" data-target="akun">
                <i class="fa fa-user text-lg"></i> Saya
            </a>
        </div>
    </nav>

    <!-- Konten Utama -->
    <main class="pt-20 pb-24 px-4 max-w-6xl mx-auto">

        <!-- Halaman Beranda -->
        <section id="beranda" class="page-content">
            <div class="flex gap-3 mb-6 overflow-x-auto pb-2">
                <button class="beranda-tab active px-4 py-2 bg-blue-600 text-white rounded-full whitespace-nowrap text-sm font-medium" data-target="semuaProduk">Semua Produk</button>
                <button class="beranda-tab px-4 py-2 bg-gray-200 rounded-full whitespace-nowrap text-sm font-medium" data-target="terlaris">Terlaris</button>
                <button class="beranda-tab px-4 py-2 bg-gray-200 rounded-full whitespace-nowrap text-sm font-medium" data-target="kategori">Kategori</button>
            </div>

            <!-- Semua Produk -->
            <div id="semuaProduk" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
            <!-- Terlaris -->
            <div id="terlaris" class="hidden grid grid-cols-2 md:grid-cols-3 gap-4"></div>
            <!-- Kategori -->
            <div id="kategori" class="hidden">
                <div class="flex flex-wrap gap-3 mb-6" id="daftarKategori"></div>
                <div id="produkKategori" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
            </div>
        </section>

        <!-- Halaman Video -->
        <section id="video" class="page-content hidden">
            <h2 class="text-xl font-bold mb-4">Video Produk & Tutorial</h2>
            <div class="mb-4 p-4 bg-white rounded-xl shadow">
                <label class="block mb-2 font-medium">Tambah Video (Link YouTube/Embed):</label>
                <input type="text" id="linkVideo" class="w-full p-3 border rounded-lg mb-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="https://www.youtube.com/embed/...">
                <button onclick="tambahVideo()" class="bg-blue-500 text-white px-5 py-2 rounded-lg hover:bg-blue-600 transition">Tambah Video</button>
            </div>
            <div id="kontenVideo" class="space-y-4"></div>
        </section>

        <!-- Halaman Akun / Pengaturan -->
        <section id="akun" class="page-content hidden">
            <div class="bg-white p-6 rounded-xl shadow">
                <h2 class="text-xl font-bold mb-5 flex items-center gap-2"><i class="fa fa-user-circle"></i> Profil Saya</h2>
                <div class="space-y-4">
                    <div>
                        <label class="font-medium text-gray-700 block mb-1">Email</label>
                        <input type="email" id="setEmail" class="w-full p-3 border rounded-lg bg-gray-50" readonly>
                    </div>
                    <div>
                        <label class="font-medium text-gray-700 block mb-1">Nomor HP</label>
                        <input type="tel" id="setHp" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="0812xxxxxxxx">
                    </div>
                    <div>
                        <label class="font-medium text-gray-700 block mb-1">Tanggal Lahir</label>
                        <input type="date" id="setTglLahir" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="font-medium text-gray-700 block mb-1">Alamat Lengkap Pengiriman</label>
                        <textarea id="setAlamat" rows="3" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Jalan, RT/RW, Kecamatan, Kabupaten, Provinsi, Kode Pos"></textarea>
                    </div>
                    <button onclick="simpanProfil()" class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition">Simpan Perubahan</button>
                    <button onclick="cekStatusPengiriman()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition flex items-center justify-center gap-2">
                        <i class="fa fa-truck"></i> Cek Status Pesanan
                    </button>
                    <button onclick="keluar()" class="w-full bg-red-500 text-white py-3 rounded-lg font-semibold hover:bg-red-600 transition mt-2">Keluar Akun</button>
                </div>
            </div>
        </section>

        <!-- Halaman Pembayaran / Checkout -->
        <section id="checkoutPage" class="page-content hidden">
            <div class="bg-white p-6 rounded-xl shadow max-w-xl mx-auto">
                <h2 class="text-xl font-bold mb-5 flex items-center gap-2"><i class="fa fa-shopping-cart"></i> Pembayaran & Pengiriman</h2>
                
                <div class="mb-4 p-4 bg-gray-50 rounded-lg">
                    <p class="font-medium text-gray-700 mb-1">Jasa Kirim:</p>
                    <p class="font-semibold">J&T Ekspres</p>
                </div>

                <div class="mb-4 p-4 bg-gray-50 rounded-lg">
                    <p class="font-medium text-gray-700 mb-1">Alamat Pengiriman:</p>
                    <p id="alamatKirim" class="text-gray-800">-</p>
                </div>

                <div class="mb-5 p-4 bg-green-50 rounded-lg border border-green-200">
                    <p class="font-medium text-gray-700 mb-1">Total Bayar:</p>
                    <p class="text-2xl font-bold text-green-700" id="totalBayar">Rp 0</p>
                </div>

                <div class="mb-6">
                    <label class="font-medium text-gray-700 block mb-2">Metode Pembayaran:</label>
                    <select id="metodeBayar" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="cod">Bayar di Tempat (COD)</option>
                        <option value="ewallet">Dompet Digital (QRIS/OVO/DANA/Gopay)</option>
                    </select>
                </div>

                <button onclick="prosesPembayaran()" class="w-full bg-orange-600 text-white py-3 rounded-lg font-bold text-lg hover:bg-orange-700 transition">Konfirmasi Pesanan</button>
            </div>
        </section>
    </main>
</div>

<script>
// === DATA AWAL ===
let penggunaAktif = null;
let dataPengguna = JSON.parse(localStorage.getItem("dataPengguna")) || [];
let dataProduk = [
    {id:1,nama:"Kaos Polos Premium",harga:45000,kategori:"Pakaian",terlaris:true},
    {id:2,nama:"Celana Jeans Pria",harga:120000,kategori:"Pakaian",terlaris:true},
    {id:3,nama:"Topi Trucker",harga:35000,kategori:"Aksesoris",terlaris:false},
    {id:4,nama:"Tas Ransel Sekolah",harga:89000,kategori:"Aksesoris",terlaris:true},
    {id:5,nama:"Sepatu Kets Putih",harga:180000,kategori:"Alas Kaki",terlaris:false},
    {id:6,nama:"Kabel Data Type-C",harga:25000,kategori:"Elektronik",terlaris:true}
];
let daftarVideo = JSON.parse(localStorage.getItem("daftarVideo")) || [];
let riwayatPesanan = JSON.parse(localStorage.getItem("riwayatPesanan")) || [];

// === 🔴 FITUR TETAP LOGIN OTOMATIS ===
window.onload = function(){
    const akunTersimpan = localStorage.getItem("penggunaAktif");
    if(akunTersimpan){
        penggunaAktif = JSON.parse(akunTersimpan);
        tampilkanHalamanUtama();
        isiDataProfil();
    }
};

// === NAVIGASI ===
function switchTab(jenis){
    document.querySelectorAll(".tab-btn").forEach(el=>el.classList.remove("active","text-blue-600","border-b-2","border-blue-600"));
    event.target.classList.add("active","text-blue-600","border-b-2","border-blue-600");
    document.getElementById("formLogin").classList.toggle("hidden",jenis!=="login");
    document.getElementById("formDaftar").classList.toggle("hidden",jenis!=="daftar");
}

document.querySelectorAll(".nav-link").forEach(link=>{
    link.addEventListener("click",e=>{
        e.preventDefault();
        document.querySelectorAll(".nav-link").forEach(l=>l.classList.remove("active","text-yellow-300"));
        link.classList.add("active","text-yellow-300");
        document.querySelectorAll(".page-content").forEach(p=>p.classList.add("hidden"));
        document.getElementById(link.dataset.target).classList.remove("hidden");
    });
});

document.querySelectorAll(".beranda-tab").forEach(btn=>{
    btn.addEventListener("click",()=>{
        document.querySelectorAll(".beranda-tab").forEach(b=>b.classList.replace("bg-blue-600","bg-gray-200").classList.replace("text-white","text-gray-700"));
        btn.classList.replace("bg-gray-200","bg-blue-600").classList.replace("text-gray-700","text-white");
        document.querySelectorAll("#beranda > div").forEach(d=>d.classList.add("hidden"));
        document.getElementById(btn.dataset.target).classList.remove("hidden");
    });
});

// === FUNGSI AKUN ===
function daftar(){
    const data = {nama:regNama.value.trim(), email:regEmail.value.trim(), sandi:regPass.value, hp:"", tglLahir:"", alamat:""};
    if(!data.nama||!data.email||!data.sandi) return alert("Lengkapi semua data terlebih dahulu!");
    if(data.sandi.length < 6) return alert("Kata sandi minimal 6 karakter!");
    if(dataPengguna.find(d=>d.email===data.email)) return alert("Email sudah terdaftar, silakan masuk!");
    dataPengguna.push(data); simpanData(); alert("✅ Pendaftaran berhasil! Silakan masuk.");
}

function login(){
    const akun = dataPengguna.find(d=>d.email===loginEmail.value.trim()&&d.sandi===loginPass.value);
    if(!akun) return alert("❌ Email atau kata sandi salah!");
    penggunaAktif = akun;
    localStorage.setItem("penggunaAktif", JSON.stringify(penggunaAktif));
    tampilkanHalamanUtama(); isiDataProfil();
}

function keluar(){
    localStorage.removeItem("penggunaAktif");
    penggunaAktif = null;
    location.reload();
}

function tampilkanHalamanUtama(){ authPage.classList.add("hidden"); mainApp.classList.remove("hidden"); muatProduk(); muatKategori(); muatVideo(); }
function isiDataProfil(){
    setEmail.value = penggunaAktif.email; setHp.value = penggunaAktif.hp||"";
    setTglLahir.value = penggunaAktif.tglLahir||""; setAlamat.value = penggunaAktif.alamat||"";
}
function simpanProfil(){
    Object.assign(penggunaAktif, {hp:setHp.value.trim(),tglLahir:setTglLahir.value,alamat:setAlamat.value.trim()});
    const indeks = dataPengguna.findIndex(d=>d.email===penggunaAktif.email);
    dataPengguna[indeks] = penggunaAktif;
    localStorage.setItem("penggunaAktif", JSON.stringify(penggunaAktif));
    simpanData(); alert("✅ Profil berhasil diperbarui!");
}

// === PRODUK & KATEGORI ===
function muatProduk(){
    const tampil = (arr,idTujuan)=>{
        idTujuan.innerHTML = "";
        if(arr.length===0) {idTujuan.innerHTML="<p class='col-span-full text-center text-gray-500'>Belum ada produk.</p>"; return;}
        arr.forEach(p=>{
            idTujuan.innerHTML += `
            <div class="bg-white p-4 rounded-xl shadow hover:shadow-md transition">
                <h3 class="font-bold text-gray-800 mb-1">${p.nama}</h3>
                <p class="text-green-600 font-bold text-lg mb-3">Rp ${p.harga.toLocaleString()}</p>
                <button onclick="beliProduk(${p.harga})" class="w-full bg-orange-500 text-white py-2 rounded-lg text-sm font-medium hover:bg-orange-600 transition">Beli Sekarang</button>
            </div>`;
        });
    };
    tampil(dataProduk,semuaProduk); tampil(dataProduk.filter(p=>p.terlaris),terlaris);
}
function muatKategori(){
    const daftar = [...new Set(dataProduk.map(p=>p.kategori))];
    daftarKategori.innerHTML = "";
    daftar.forEach(k=>{
        const btn = document.createElement("button");
        btn.className="px-4 py-2 bg-gray-200 rounded-lg text-sm font-medium hover:bg-blue-500 hover:text-white transition";
        btn.textContent=k; btn.onclick=()=>{
            document.querySelectorAll(".beranda-tab").forEach(b=>b.classList.replace("bg-blue-600","bg-gray-200").classList.replace("text-white","text-gray-700"));
            kategori.classList.remove("hidden");
            produkKategori.innerHTML="";
            dataProduk.filter(p=>p.kategori===k).forEach(p=>produkKategori.innerHTML+=`
            <div class="bg-white p-4 rounded-xl shadow">
                <h3 class="font-bold mb-1">${p.nama}</h3>
                <p class="text-green-600 font-bold mb-3">Rp ${p.harga.toLocaleString()}</p>
                <button onclick="beliProduk(${p.harga})" class="w-full bg-orange-500 text-white py-2 rounded-lg text-sm hover:bg-orange-600">Beli Sekarang</button>
            </div>`);
        };
        daftarKategori.appendChild(btn);
    });
}

// === VIDEO ===
function tambahVideo(){
    const link = linkVideo.value.trim();
    if(!link) return alert("Masukkan tautan video terlebih dahulu!");
    daftarVideo.push(link); simpanData(); muatVideo(); linkVideo.value="";
    alert("✅ Video berhasil ditambahkan!");
}
function muatVideo(){
    kontenVideo.innerHTML="";
    if(daftarVideo.length===0) {kontenVideo.innerHTML="<p class='text-gray-500 text-center py-8'>Belum ada video yang ditampilkan.</p>"; return;}
    daftarVideo.forEach((l,i)=>{
        kontenVideo.innerHTML += `
        <div class="bg-white p-4 rounded-xl shadow">
            <iframe width="100%" height="240" src="${l}" frameborder="0" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope"></iframe>
        </div>`;
    });
}

// === PEMBAYARAN & PENGIRIMAN ===
function beliProduk(harga){
    if(!penggunaAktif.alamat) return alert("⚠️ Lengkapi alamat pengiriman dulu di menu 'Saya'!");
    totalBayar.innerText = "Rp " + harga.toLocaleString();
    alamatKirim.innerText = penggunaAktif.alamat;
    document.querySelectorAll(".page-content").forEach(p=>p.classList.add("hidden"));
    checkoutPage.classList.remove("hidden"); checkoutPage.dataset.harga = harga;
}
function prosesPembayaran(){
    const metode = metodeBayar.value;
    const total = parseInt(checkoutPage.dataset.harga);
    let statusAwal = metode==="ewallet" ? "✅ Lunas Otomatis - Menunggu Konfirmasi Toko" : "⏳ Menunggu Konfirmasi Toko (COD)";

    const pesanan = {
        id:Date.now(), pembeli:penggunaAktif.email, alamat:penggunaAktif.alamat,
        total, metode, status:statusAwal, kurir:"J&T Ekspres", tanggal:new Date().toLocaleString()
    };
    riwayatPesanan.push(pesanan); simpanData();

    alert(metode==="ewallet" ? "✅ Pembayaran Berhasil! Pesanan sedang diproses." : "✅ Pesanan tercatat dengan metode COD.");
    document.querySelectorAll(".page-content").forEach(p=>p.classList.add("hidden"));
    beranda.classList.remove("hidden");
}

// === CEK STATUS PESANAN ===
function cekStatusPengiriman(){
    const milikSaya = riwayatPesanan.filter(p=>p.pembeli===penggunaAktif.email);
    if(!milikSaya.length) return alert("📦 Belum ada riwayat pesanan Anda.");

    let isi = "📦 === STATUS PESANAN ANDA ===\n\n";
    milikSaya.forEach((ps, no)=>{
        isi += `📝 Pesanan ke-${no+1}\n`;
        isi += `🕒 Tanggal: ${ps.tanggal}\n`;
        isi += `💰 Total: Rp ${ps.total.toLocaleString()}\n`;
        isi += `💳 Metode: ${ps.metode.toUpperCase()}\n`;
        isi += `🚚 Kurir: ${ps.kurir}\n`;
        isi += `📍 Alamat: ${ps.alamat}\n`;
        isi += `📊 STATUS TERBARU:\n   ${ps.status}\n`;
        isi += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
    });
    alert(isi);
}

// === PENYIMPANAN DATA ===
function simpanData(){
    localStorage.setItem("dataPengguna",JSON.stringify(dataPengguna));
    localStorage.setItem("daftarVideo",JSON.stringify(daftarVideo));
    localStorage.setItem("riwayatPesanan",JSON.stringify(riwayatPesanan));
}
</script>
</body>
</html>
