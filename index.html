<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Saya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">

<!-- Halaman Login/Daftar -->
<div id="authPage" class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <div class="flex mb-4 border-b">
            <button class="tab-btn active px-4 py-2 w-1/2" onclick="switchTab('login')">Masuk</button>
            <button class="tab-btn px-4 py-2 w-1/2" onclick="switchTab('daftar')">Daftar</button>
        </div>

        <!-- Form Masuk -->
        <div id="formLogin">
            <div class="mb-4">
                <label>Email</label>
                <input type="email" id="loginEmail" class="w-full p-2 border rounded mt-1" placeholder="email@anda.com">
            </div>
            <div class="mb-4">
                <label>Kata Sandi</label>
                <input type="password" id="loginPass" class="w-full p-2 border rounded mt-1" placeholder="******">
            </div>
            <button onclick="login()" class="w-full bg-blue-600 text-white py-2 rounded">Masuk</button>
        </div>

        <!-- Form Daftar -->
        <div id="formDaftar" class="hidden">
            <div class="mb-4">
                <label>Nama Lengkap</label>
                <input type="text" id="regNama" class="w-full p-2 border rounded mt-1">
            </div>
            <div class="mb-4">
                <label>Email</label>
                <input type="email" id="regEmail" class="w-full p-2 border rounded mt-1">
            </div>
            <div class="mb-4">
                <label>Kata Sandi</label>
                <input type="password" id="regPass" class="w-full p-2 border rounded mt-1">
            </div>
            <button onclick="daftar()" class="w-full bg-green-600 text-white py-2 rounded">Buat Akun</button>
        </div>
    </div>
</div>

<!-- Halaman Utama (Setelah Login) -->
<div id="mainApp" class="hidden">
    <!-- Navbar -->
    <nav class="bg-blue-700 text-white fixed w-full top-0 z-10 shadow">
        <div class="flex justify-around py-3">
            <a href="#" class="nav-link active" data-target="beranda"><i class="fa fa-home"></i> Beranda</a>
            <a href="#" class="nav-link" data-target="video"><i class="fa fa-video-camera"></i> Video</a>
            <a href="#" class="nav-link" data-target="akun"><i class="fa fa-user"></i> Saya</a>
        </div>
    </nav>

    <!-- Konten Utama -->
    <main class="pt-16 pb-10 px-4 max-w-6xl mx-auto">

        <!-- Halaman Beranda -->
        <section id="beranda" class="page-content">
            <div class="flex gap-3 mb-6 overflow-x-auto">
                <button class="beranda-tab active px-4 py-2 bg-blue-600 text-white rounded" data-target="semuaProduk">Semua Produk</button>
                <button class="beranda-tab px-4 py-2 bg-gray-200 rounded" data-target="terlaris">Terlaris</button>
                <button class="beranda-tab px-4 py-2 bg-gray-200 rounded" data-target="kategori">Kategori</button>
            </div>

            <!-- Semua Produk -->
            <div id="semuaProduk" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <!-- Produk dimuat dari JS -->
            </div>

            <!-- Terlaris -->
            <div id="terlaris" class="hidden grid grid-cols-2 md:grid-cols-3 gap-4"></div>

            <!-- Kategori -->
            <div id="kategori" class="hidden">
                <div class="flex flex-wrap gap-3 mb-6" id="daftarKategori"></div>
                <div id="produkKategori" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
            </div>
        </section>

        <!-- Halaman Video -->
        <section id="video" class="page-content hidden">
            <h2 class="text-xl font-bold mb-4">Video Kami</h2>
            <div class="mb-4 p-3 bg-white rounded shadow">
                <label class="block mb-2">Tambah Video (Tautan/Link):</label>
                <input type="text" id="linkVideo" class="w-full p-2 border rounded mb-2" placeholder="https://...">
                <button onclick="tambahVideo()" class="bg-blue-500 text-white px-3 py-1 rounded">Tambah</button>
            </div>
            <div id="kontenVideo" class="space-y-4"></div>
        </section>

        <!-- Halaman Akun / Pengaturan -->
        <section id="akun" class="page-content hidden">
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-bold mb-4">Profil Saya</h2>
                <div class="grid gap-4">
                    <div>
                        <label>Email</label>
                        <input type="email" id="setEmail" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label>Nomor HP</label>
                        <input type="tel" id="setHp" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label>Tanggal Lahir</label>
                        <input type="date" id="setTglLahir" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label>Alamat Lengkap</label>
                        <textarea id="setAlamat" rows="3" class="w-full p-2 border rounded"></textarea>
                    </div>
                    <button onclick="simpanProfil()" class="bg-green-600 text-white py-2 rounded">Simpan Perubahan</button>
                    <button onclick="cekStatusPengiriman()" class="bg-gray-700 text-white py-2 rounded mt-2">Cek Status Pengiriman</button>
                    <button onclick="keluar()" class="bg-red-500 text-white py-2 rounded mt-2">Keluar Akun</button>
                </div>
            </div>
        </section>

        <!-- Halaman Pembayaran / Checkout -->
        <section id="checkoutPage" class="page-content hidden">
            <div class="bg-white p-6 rounded-lg shadow max-w-xl mx-auto">
                <h2 class="text-xl font-bold mb-4">Pembayaran & Pengiriman (J&T)</h2>
                <p class="mb-3">Alamat Pengiriman: <span id="alamatKirim"></span></p>
                <p class="mb-4">Total Bayar: <strong id="totalBayar">Rp 0</strong></p>

                <div class="mb-4">
                    <label class="font-semibold">Metode Pembayaran:</label>
                    <select id="metodeBayar" class="w-full p-2 border rounded mt-2">
                        <option value="cod">Bayar di Tempat (COD)</option>
                        <option value="ewallet">Dompet Digital / E-Wallet</option>
                    </select>
                </div>

                <button onclick="prosesPembayaran()" class="w-full bg-blue-600 text-white py-3 rounded font-bold">Proses Pesanan</button>
            </div>
        </section>
    </main>
</div>

<script>
// === DATA AWAL ===
let penggunaAktif = null;
let dataPengguna = JSON.parse(localStorage.getItem("dataPengguna")) || [];
let dataProduk = [
    {id:1,nama:"Kaos Polos",harga:45000,kategori:"Pakaian",terlaris:true},
    {id:2,nama:"Celana Jeans",harga:120000,kategori:"Pakaian",terlaris:true},
    {id:3,nama:"Topi",harga:35000,kategori:"Aksesoris",terlaris:false},
    {id:4,nama:"Tas Ransel",harga:89000,kategori:"Aksesoris",terlaris:true},
    {id:5,nama:"Sepatu Kets",harga:180000,kategori:"Alas Kaki",terlaris:false}
];
let daftarVideo = JSON.parse(localStorage.getItem("daftarVideo")) || [];
let riwayatPesanan = JSON.parse(localStorage.getItem("riwayatPesanan")) || [];

// === NAVIGASI & ANTARMUKA ===
function switchTab(jenis){
    document.querySelectorAll(".tab-btn").forEach(el=>el.classList.remove("active","bg-blue-100"));
    event.target.classList.add("active","bg-blue-100");
    document.getElementById("formLogin").classList.toggle("hidden",jenis!=="login");
    document.getElementById("formDaftar").classList.toggle("hidden",jenis!=="daftar");
}

document.querySelectorAll(".nav-link").forEach(link=>{
    link.addEventListener("click",e=>{
        e.preventDefault();
        document.querySelectorAll(".nav-link").forEach(l=>l.classList.remove("active","underline"));
        link.classList.add("active","underline");
        document.querySelectorAll(".page-content").forEach(p=>p.classList.add("hidden"));
        document.getElementById(link.dataset.target).classList.remove("hidden");
    });
});

document.querySelectorAll(".beranda-tab").forEach(btn=>{
    btn.addEventListener("click",()=>{
        document.querySelectorAll(".beranda-tab").forEach(b=>b.classList.replace("bg-blue-600","bg-gray-200"));
        btn.classList.replace("bg-gray-200","bg-blue-600");
        document.querySelectorAll("#beranda > div").forEach(d=>d.classList.add("hidden"));
        document.getElementById(btn.dataset.target).classList.remove("hidden");
    });
});

// === FUNGSI AKUN ===
function daftar(){
    const data = {
        nama:regNama.value, email:regEmail.value, sandi:regPass.value,
        hp:"", tglLahir:"", alamat:""
    };
    if(!data.nama||!data.email||!data.sandi) return alert("Lengkapi data!");
    dataPengguna.push(data); simpanData(); alert("Daftar berhasil! Silakan masuk.");
}
function login(){
    const akun = dataPengguna.find(d=>d.email===loginEmail.value&&d.sandi===loginPass.value);
    if(!akun) return alert("Email atau kata sandi salah!");
    penggunaAktif = akun; tampilkanHalamanUtama(); isiDataProfil();
}
function keluar(){ penggunaAktif=null; location.reload(); }
function tampilkanHalamanUtama(){ authPage.classList.add("hidden"); mainApp.classList.remove("hidden"); muatProduk(); muatKategori(); muatVideo(); }
function isiDataProfil(){
    setEmail.value = penggunaAktif.email; setHp.value = penggunaAktif.hp||"";
    setTglLahir.value = penggunaAktif.tglLahir||""; setAlamat.value = penggunaAktif.alamat||"";
}
function simpanProfil(){
    Object.assign(penggunaAktif, {hp:setHp.value,tglLahir:setTglLahir.value,alamat:setAlamat.value});
    simpanData(); alert("Profil tersimpan!");
}

// === PRODUK & KATEGORI ===
function muatProduk(){
    const tampil = (arr,idTujuan)=>{
        idTujuan.innerHTML = "";
        arr.forEach(p=>{
            idTujuan.innerHTML += `
            <div class="bg-white p-3 rounded shadow">
                <h3 class="font-bold">${p.nama}</h3>
                <p class="text-green-600">Rp ${p.harga.toLocaleString()}</p>
                <button onclick="beliProduk(${p.harga})" class="w-full mt-2 bg-orange-500 text-white py-1 rounded">Beli Sekarang</button>
            </div>`;
        });
    };
    tampil(dataProduk,semuaProduk); tampil(dataProduk.filter(p=>p.terlaris),terlaris);
}
function muatKategori(){
    const daftar = [...new Set(dataProduk.map(p=>p.kategori))];
    daftarKategori.innerHTML = "";
    daftar.forEach(k=>{
        const btn = document.createElement("button");
        btn.className="px-3 py-2 bg-gray-300 rounded hover:bg-blue-500 hover:text-white";
        btn.textContent=k; btn.onclick=()=>{
            produkKategori.innerHTML="";
            dataProduk.filter(p=>p.kategori===k).forEach(p=>produkKategori.innerHTML+=`
            <div class="bg-white p-3 rounded shadow">
                <h3 class="font-bold">${p.nama}</h3><p class="text-green-600">Rp ${p.harga.toLocaleString()}</p>
                <button onclick="beliProduk(${p.harga})" class="w-full mt-2 bg-orange-500 text-white py-1 rounded">Beli Sekarang</button>
            </div>`);
        };
        daftarKategori.appendChild(btn);
    });
}

// === VIDEO ===
function tambahVideo(){
    if(!linkVideo.value) return; daftarVideo.push(linkVideo.value); simpanData(); muatVideo(); linkVideo.value="";
}
function muatVideo(){
    kontenVideo.innerHTML="";
    daftarVideo.forEach((l,i)=>{
        kontenVideo.innerHTML += `
        <div class="bg-white p-3 rounded shadow">
            <iframe width="100%" height="200" src="${l}" frameborder="0" allowfullscreen></iframe>
        </div>`;
    });
}

// === PEMBAYARAN & PENGIRIMAN (J&T TERINTEGRASI) ===
function beliProduk(harga){
    if(!penggunaAktif.alamat) return alert("Lengkapi alamat dulu di menu 'Saya'!");
    totalBayar.innerText = "Rp " + harga.toLocaleString();
    alamatKirim.innerText = penggunaAktif.alamat + " | Layanan Pengiriman: J&T Ekspres";
    document.querySelectorAll(".page-content").forEach(p=>p.classList.add("hidden"));
    checkoutPage.classList.remove("hidden"); checkoutPage.dataset.harga = harga;
}
function prosesPembayaran(){
    const metode = metodeBayar.value;
    const total = parseInt(checkoutPage.dataset.harga);
    const status = metode==="ewallet" ? "✅ Lunas Otomatis - J&T Sedang Memproses" : "⏳ Menunggu Pembayaran / COD";

    // Simpan ke riwayat & dikirim ke basis data pusat
    const pesanan = {
        id:Date.now(), pembeli:penggunaAktif.email, alamat:penggunaAktif.alamat,
        total, metode, status, kurir:"J&T Ekspres", tanggal:new Date().toLocaleString()
    };
    riwayatPesanan.push(pesanan); simpanData();

    alert(metode==="ewallet" ? "✅ Pembayaran berhasil! Dialihkan ke beranda..." : "✅ Pesanan tercatat!");
    // Kembali ke beranda
    document.querySelectorAll(".page-content").forEach(p=>p.classList.add("hidden"));
    beranda.classList.remove("hidden");
}
function cekStatusPengiriman(){
    const milikSaya = riwayatPesanan.filter(p=>p.pembeli===penggunaAktif.email);
    if(!milikSaya.length) return alert("Belum ada riwayat pesanan.");
    let teks = "📦 RIWAYAT PENGIRIMAN:\n";
    milikSaya.forEach(p=>teks+=`\nID:${p.id} | Total:Rp${p.total.toLocaleString()}\nStatus:${p.status}\nKurir:${p.kurir}\nAlamat:${p.alamat}\n---`);
    alert(teks);
}

// === PENYIMPANAN DATA ===
function simpanData(){
    localStorage.setItem("dataPengguna",JSON.stringify(dataPengguna));
    localStorage.setItem("daftarVideo",JSON.stringify(daftarVideo));
    localStorage.setItem("riwayatPesanan",JSON.stringify(riwayatPesanan));
}
</script>
</body>
</html>
